spring.application.name=project

# Database:
# 1) Для облака задавайте DATABASE_URL / DB_USERNAME / DB_PASSWORD (Neon, Supabase, Railway, RDS и т.д.)
# 2) Для локальной разработки используется localhost fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/assignment3}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA - можно переопределить через переменные окружения
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:}

# Connection pool (HikariCP): более стабильная работа под нагрузкой
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

# JWT
# Локальный fallback нужен только для разработки. В production задавайте JWT_SECRET_KEY через переменные окружения.
security.jwt.secret-key=${JWT_SECRET_KEY:local-dev-secret-change-me-local-dev-secret-change-me}
security.jwt.expiration-time=86400000
security.jwt.algorithm=HS256

# Application
app.images.base-dir=${APP_IMAGES_BASE_DIR:images}
api.version=${API_VERSION:/api/v1}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,https://azhaarfuund.netlify.app}

# Server - порт можно задать через переменные окружения
server.port=${PORT:${SERVER_PORT:8080}}
server.address=0.0.0.0
